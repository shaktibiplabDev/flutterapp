name: ekiraya_app
description: EKiraya - Rental Management App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.0
  dio: ^5.3.3
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Utilities
  intl: ^0.18.1
  equatable: ^2.0.5
  
  # OTP & Verification
  pinput: ^4.0.0
  
  # Google Sign In
  google_sign_in: ^6.1.5
  
  # Loading & Indicators
  flutter_spinkit: ^5.2.0
  
  # Form Validation
  validators: ^3.0.0
  
  webview_flutter: ^4.4.0

  lottie: ^2.7.0 

  flutter_native_splash: ^2.3.10

  flutter_cashfree_pg_sdk: 2.2.10+48
  mime: ^1.0.4
  image_picker: ^1.0.5
  open_file: ^3.3.2
  permission_handler: ^11.0.1
  flutter_slidable: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/blank.png

  android_12:
    color: "#ffffff"
    image: assets/images/blank.png
    icon_background_color: "#ffffff"

  android: true
  ios: true
  fullscreen: true